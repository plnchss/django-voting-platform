{% extends 'voting/base.html' %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="form-page-container">
    
    <a href="{% url 'index' %}" class="back-link">← На главную</a>

    <div class="form-card-container">
        <h2 class="form-title">Регистрация</h2>
        
        <form method="post" class="django-styled-form">
            {% csrf_token %}
            
            {# Django сам сгенерирует p, label, input и мелкий текст подсказок helptext #}
            {{ form.as_p }}
            
            <button type="submit" class="submit-form-btn">Зарегистрироваться</button>
        </form>

        <div class="form-footer-link">
            <span>Уже есть аккаунт?</span> 
            <a href="{% url 'login' %}" class="simple-link-accent">Войти</a>
        </div>
    </div>

</div>
{% endblock %}

{% extends 'voting/base.html' %}

{% block title %}Удаление: {{ voting.title }}{% endblock %}

{% block content %}
<div class="detail-container" style="max-width: 500px; margin: 60px auto; text-align: center;">
    <div class="voting-main-card" style="border: 1px solid #e53e3e; box-shadow: 0 4px 20px rgba(229, 62, 62, 0.05);">
        <h2 class="voting-title" style="color: #e53e3e; margin-bottom: 12px;">Удалить «{{ voting.title }}»?</h2>
        <p class="voting-desc" style="margin-bottom: 25px;">Это действие абсолютно необратимо. Все связанные номинации, участники и голоса будут безвозвратно стёрты.</p>
        
        <form method="post" style="display: flex; justify-content: center; align-items: center; gap: 20px;">
            {% csrf_token %}
            <button type="submit" class="submit-vote-btn" style="background: #e53e3e; margin: 0;">Да, удалить</button>
            <a href="{% url 'voting_detail' voting.id %}" class="back-link" style="margin: 0; padding: 10px 15px;">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
